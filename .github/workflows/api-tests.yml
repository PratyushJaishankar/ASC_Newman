on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  api-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run API Tests
        run: |
          newman run jsonplaceholder_collection.json \
            -e environment.json \
            -r cli,htmlextra \
            --reporter-htmlextra-export report.html

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: report.html
