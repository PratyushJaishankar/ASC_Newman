on:
  push:
  pull_request:

jobs:
  api-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # ✅ latest version
      - name: Setup Node.js
        uses: actions/setup-node@v4  # ✅ latest version
        with:
          node-version: '20'         # ✅ current LTS (Node 20)
      - name: Install Newman
        run: npm install -g newman newman-reporter-html
      - name: Run API Tests
        run: |
          newman run jsonplaceholder_collection.json \
            -e environment.json \
            -r cli,htmlextra \
            --reporter-html-export report.html
      - name: Upload HTML Report
        uses: actions/upload-artifact@v4  # ✅ latest version
        with:
          name: api-test-report
          path: report.html
  deploy-html-report:
    needs: api-test
    runs-on: ubuntu-latest
    if: always() # ensures it runs even if tests fail
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download Allure report artifact
        uses: actions/download-artifact@v4
        with:
          name: api-test-report
          path: ./report.html

      - name: Deploy report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./report.html

